name: Medical Platform CI

on:
  push:
    branches: [ "main", "develop", "backend-initial-commit" ]
  pull_request:
    branches: [ "main", "develop", "backend-initial-commit" ]

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Common Module
        run: |
          cd medical-common
          mvn clean install -DskipTests
          cd ..

      - name: Build User Service
        run: |
          cd medical-user
          mvn clean package -DskipTests
          cd ..

      - name: Build Notification Service
        run: |
          cd medical-notification
          mvn clean package -DskipTests
          cd ..

      - name: Build Appointment Service
        run: |
          cd medical-appointment
          mvn clean package -DskipTests
          cd ..

      - name: Build Gateway Service
        run: |
          cd medical-gateway
          mvn clean package -DskipTests
          cd ..

      - name: Build Eureka Server
        run: |
          cd medical-eureka-server
          mvn clean package -DskipTests
          cd ..

      - name: Run Tests
        run: mvn test

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push User Service
        uses: docker/build-push-action@v4
        with:
          context: .
          file: medical-user/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/medical-user:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/medical-user:${{ env.IMAGE_TAG }}

      - name: Build and Push Notification Service
        uses: docker/build-push-action@v4
        with:
          context: .
          file: medical-notification/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/medical-notification:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/medical-notification:${{ env.IMAGE_TAG }}

      - name: Build and Push Appointment Service
        uses: docker/build-push-action@v4
        with:
          context: .
          file: medical-appointment/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/medical-appointment:latest
