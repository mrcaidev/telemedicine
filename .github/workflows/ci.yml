name: Medical Platform CI/CD

on:
  push:
    branches: [ main, develop, backend-initial-commit ]
  pull_request:
    branches: [ main, develop, backend-initial-commit ]

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package --file pom.xml -DskipTests

      - name: Run tests
        run: mvn test

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: web-dashboard/package-lock.json

      - name: Install dependencies
        run: cd web-dashboard && npm ci

      - name: Lint
        run: cd web-dashboard && npm run lint

      - name: Build
        run: cd web-dashboard && npm run build

  build-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: cd auth && bun install

      - name: Build
        run: cd auth && bun run build

  # This job will build and push Docker images if on main branch
  deploy:
    needs: [build-and-test-backend, build-dashboard, build-auth]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/backend-initial-commit') && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push microservices
        run: |
          # Build Java microservices
          mvn -B clean package --file pom.xml -DskipTests
          
          # Build and push Docker images for each microservice
          docker build -t medical/eureka-server:${{ github.sha }} ./medical-eureka-server
          docker push medical/eureka-server:${{ github.sha }}
          
          docker build -t medical/gateway:${{ github.sha }} ./medical-gateway
          docker push medical/gateway:${{ github.sha }}
          
          docker build -t medical/user:${{ github.sha }} ./medical-user
          docker push medical/user:${{ github.sha }}
          
          docker build -t medical/appointment:${{ github.sha }} ./medical-appointment
          docker push medical/appointment:${{ github.sha }}
          
          docker build -t medical/notification:${{ github.sha }} ./medical-notification
          docker push medical/notification:${{ github.sha }}
          
          # Build and push frontend
          docker build -t medical/web-dashboard:${{ github.sha }} ./web-dashboard
          docker push medical/web-dashboard:${{ github.sha }}
          
          # Build and push auth service
          docker build -t medical/auth:${{ github.sha }} ./auth
          docker push medical/auth:${{ github.sha }}